{% extends 'courses/base.html' %}

{% block content %}

<h2>Register</h2>

<form method="POST">

    {% csrf_token %}

    <p>
        Username:
        <input type="text" name="username">
    </p>

    <p>
        Password:
        <input type="password" name="password">
    </p>

    <p>
        Confirm Password:
        <input type="password" name="confirm_password">
    </p>

    <button type="submit"  class="btn btn-primary">
        Register
    </button>

</form>

{% endblock %}
