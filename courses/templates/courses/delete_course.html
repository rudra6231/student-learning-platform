{% extends 'courses/base.html' %}

{% block content %}

<div class="card">

    <div class="card-body">

        <h2>Delete Course</h2>

        <p>
            Are you sure you want to delete
            <strong>{{ course.title }}</strong> ?
        </p>

        <form method="POST">

            {% csrf_token %}

            <button
                type="submit"
                class="btn btn-danger">
                Delete
            </button>

            <a
                href="{% url 'dashboard' %}"
                class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>

</div>

{% endblock %}
