<!DOCTYPE html>
<html>
<head>
    <title>Student Learning Platform</title>
    <!-- bootstrap  -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <h1>Student Learning Platform</h1>

    <hr>
    <nav>

        <a href="/">
            Home
        </a>

        |

        <a href="/add_course/">
            Add Course
        </a>

    </nav>

    <hr>

    

    {% if request.user.is_authenticated %}

        Hello {{ request.user }}
        
        <a href="{% url 'dashboard' %}">
        Dashboard
        </a>
        
        <a href="{% url 'logout' %}">
            Logout
        </a>

    {% else %}

        <a href="{% url 'login' %}">
            Login
        </a>

        <a href="{% url 'register' %}">
            Register
        </a>

    {% endif %}

    {% if messages %}

        {% for message in messages %}

            <!-- <p style = "color : green; font-size : 20px;">
                {{ message }}
            </p> -->
            <div class="alert alert-success">
               {{ message }}
            </div>

        {% endfor %}

    {% endif %}
    
    <!-- using bootstrap container class to wrap the content of the page and provide some margin at the top (mt-4) for better spacing. -->
    <div class="container mt-4">  <!-- m - margin, t - top, 4 - size of the margin (1-5) -->
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
